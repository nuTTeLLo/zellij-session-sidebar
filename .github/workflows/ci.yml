name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test --target x86_64-unknown-linux-gnu

      - name: Clippy
        run: cargo clippy --target x86_64-unknown-linux-gnu -- -D warnings

  build:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build wasm plugin
        run: cargo build --target wasm32-wasip1 --release

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-session-sidebar
          path: target/wasm32-wasip1/release/zellij-session-sidebar.wasm
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: target/wasm32-wasip1/release/zellij-session-sidebar.wasm
          asset_name: zellij-session-sidebar.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
